<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VellumCadence — Demo Reels</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #fff;
  }
  header p {
    margin-top: 8px;
    color: #888;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .grid {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 320px;
  }
  .card h2 {
    font-size: 15px;
    font-weight: 400;
    color: #ccc;
    letter-spacing: 0.05em;
    text-align: center;
  }
  .video-wrap {
    width: 270px;
    height: 480px;
    border-radius: 16px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .badge {
    font-size: 11px;
    color: #666;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  footer {
    text-align: center;
    margin-top: 60px;
    color: #444;
    font-size: 13px;
  }
  footer a { color: #666; text-decoration: none; }
  footer a:hover { color: #fff; }
</style>
</head>
<body>

<header>
  <h1>VELLUMCADENCE</h1>
  <p>AI-Powered Reels &amp; Visuals — Demo</p>
</header>

<div class="grid">

  <div class="card">
    <h2>Botanical Beauty NL</h2>
    <div class="video-wrap">
      <video src="assets/reels/botanical-reel.mp4" controls playsinline muted loop poster="assets/demos/botanical-scene1.png"></video>
    </div>
    <span class="badge">Organic Skincare · NL</span>
  </div>

  <div class="card">
    <h2>Nairobi Skincare</h2>
    <div class="video-wrap">
      <video src="assets/reels/nairobi-reel.mp4" controls playsinline muted loop poster="assets/demos/nairobi-scene1.png"></video>
    </div>
    <span class="badge">Natural Body Care · NL</span>
  </div>

  <div class="card">
    <h2>Julia Otilia Jewellery</h2>
    <div class="video-wrap">
      <video src="assets/reels/julia-reel.mp4" controls playsinline muted loop poster="assets/demos/julia-scene1.png"></video>
    </div>
    <span class="badge">Conscious Jewellery · SE/NL</span>
  </div>

</div>

<footer>
  <a href="https://vellumcadence.com">vellumcadence.com</a> &nbsp;·&nbsp; @vellumcadence
</footer>

</body>
</html>
